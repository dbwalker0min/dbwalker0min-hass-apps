configuration:
  notebook_dir:
    name: Notebook Directory
    description: >
      The directory where Jupyter notebooks will be stored (default: /config/pyscript)
  
  jupyter_token:
    name: Jupyter Token
    description: >
      The token used for Jupyter authentication (optional). If not set (and the password is not set), Jupyter will start with
      a random token.
  
  jupyter_password:
    name: Jupyter Password
    description: >
      Password for Jupyter authentication (optional). If set, this password will be hashed appropriately for 
      Jupyter. If not set, Jupyter will start without a password.
  
  hass_host:
    name: Home Assistant Host
    description: >
      The hostname or IP address of your Home Assistant instance (e.g., "homeassistant" or "192.168.1.100").
      If no value is provided, the value `supervisor` will be used.

  hass_url:
    name: Home Assistant URL
    description: >
      The URL of your Home Assistant instance (e.g., "http://homeassistant:8123" or "http://192.168.1.100:8123").
      If no value is provided, the value `http://supervisor/core` will be used.

  hass_token:
    name: Home Assistant Token
    description: >
      The long-lived access token for your Home Assistant instance. 
      If no value is provided, the contents of the environment variable `SUPERVISOR_TOKEN` will be used.
  
  extra_args:
    name: Extra Jupyter Arguments
    description: >
      Additional command line arguments to pass to the Jupyter server (optional). For example, you could set
      `--allow-root` here if you want to run Jupyter as root (not recommended). 
      The string is split into arguments using shell-style quoting rules, 
      so you can include multiple arguments here if needed.