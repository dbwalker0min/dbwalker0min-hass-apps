name: "Jupyter + Pyscript"
slug: "jupyter_pyscript"
description: "JupyterLab on HAOS with pyscript kernel; notebooks live in /config/pyscript; pyscript.conf generated from options"
version: "0.1.26"
arch: [amd64]
startup: application
boot: auto
init: false

ports:
  8888/tcp: 8888

map:
  - type: config
    read_only: false
  - type: data
    read_only: false

homeassistant_api: true

environment:
  JUPYTER_CONFIG_DIR: "/data/.jupyter"

options:
  hass_host: ""
  notebook_dir: "/config/pyscript"

  # Jupyter auth
  jupyter_token: ""
  jupyter_password: ""                # hashed (optional)

  extra_args: ""

schema:
  hass_host: str
  notebook_dir: str?

  jupyter_token: str?
  jupyter_password: str?

  extra_args: str?