name: "Jupyter + Pyscript"
slug: "jupyter_pyscript"
description: "JupyterLab on HAOS with pyscript kernel; notebooks live in /config/pyscript; pyscript.conf generated from options"
version: "0.0.0"
arch:
  - amd64
  - aarch64
  
startup: application
boot: auto
init: false

# host_network is enabled to make Jupyter reachable directly on the host/LAN without
# additional port mapping complexity in this add-on setup. Home Assistant API access for
# the pyscript kernel is provided via Supervisor (`homeassistant_api: true` and
# `http://supervisor/core`), not by host networking itself.
host_network: true

map:
  - type: config
    read_only: false
  - type: data
    read_only: false

homeassistant_api: true

environment:
  JUPYTER_CONFIG_DIR: /data/.jupyter
  PYTHONPATH: /config/pyscript/modules
  CHOWN_EXTRA: /config/pyscript,/data
  CHOWN_EXTRA_OPTS: -R

options:
  notebook_dir: "/config/pyscript"

  # Jupyter auth
  jupyter_token: ""
  jupyter_password: ""                # hashed (optional)

  extra_args: ""

schema:
  notebook_dir: str?

  jupyter_token: str?
  jupyter_password: str?

  extra_args: str?