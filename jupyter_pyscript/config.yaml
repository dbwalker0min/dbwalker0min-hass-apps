name: "Jupyter + Pyscript"
slug: "jupyter_pyscript"
description: "JupyterLab on HAOS with pyscript kernel; notebooks live in /config/pyscript; pyscript.conf generated from options"
version: "0.2.0"
arch:
  - amd64
  - aarch64
  
startup: application
boot: auto
init: false

map:
  - type: config
    read_only: false
  - type: data
    read_only: false

homeassistant_api: true

ports:
  8888/tcp: 8888

environment:
  JUPYTER_CONFIG_DIR: "/data/.jupyter"
  PYTHONPATH: "/config/pyscript/modules"
  CHOWN_EXTRA: "/config/pyscript,/data"
  CHOWN_EXTRA_OPTS: "-R"

options:
  notebook_dir: "/config/pyscript"

  jupyter_auth:
    jupyter_token: null
    jupyter_password: null

  hass_auth:
    hass_host: null
    hass_url: null
    hass_token: null

  extra_args: ""

schema:
  notebook_dir: str

  jupyter_auth:
    jupyter_token: str?
    jupyter_password: str?
  
  hass_auth:
    hass_host: str?
    hass_url: str?
    hass_token: str?

  extra_args: str